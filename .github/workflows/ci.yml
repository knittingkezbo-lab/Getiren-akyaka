name: CI

# Laravel uygulaması repo kökünde değil, `getiren/` alt klasöründe.
#
# İKİ TUZAK VAR, İKİSİ DE YAŞANDI:
#
# 1) Üçüncü taraf action kullanılmıyor (shivammathur/setup-php, ramsey/composer-install).
#    Bu depoda onlar "Set up job" aşamasında engelleniyor: 29 koşu boyunca PHP job'ları
#    daha ilk saniyede düşmüş, yalnızca GitHub'ın kendi action'larını kullanan vite job'ı
#    geçmişti. Yani CI aylarca kırmızıydı ve kimse bir şey doğrulamıyordu.
#
# 2) PHP sürümü 8.4 OLMAK ZORUNDA. composer.lock'taki symfony/* bileşenleri php >=8.4.1
#    istiyor; ubuntu-latest runner'ında PHP 8.3 var ve `composer install` orada düşüyor.
#    Bu yüzden PHP job'ları php:8.4-cli container'ında koşuyor — üretimdeki sürümün aynısı.
#
# 3) Eklentiler Dockerfile ile BİREBİR AYNI kurulur (pdo_mysql mbstring bcmath zip intl
#    pcntl). php:8.4-cli bunların çoğunu varsayılan getirmez; composer install ve Pint
#    onlarsız da çalıştığı için sorun ancak `artisan test` aşamasında ortaya çıkıyordu.
#    Kural: CI'daki PHP ortamı geliştirme imajından farklı olmamalı.
#
# NOT: container job'larında servislere port değil SERVİS ADIYLA erişilir (mysql:3306).
#
# sqlite hızlı geri bildirim içindir ama tek başına yetmez: lockForUpdate, koşullu UPDATE
# ve unique çakışması gibi paranın etrafındaki davranışları MySQL gibi modellemez.

on:
  push:
  pull_request:

jobs:
  tests:
    name: PHPUnit (sqlite)
    runs-on: ubuntu-latest
    container:
      image: php:8.4-cli
    defaults:
      run:
        working-directory: getiren
    steps:
      - name: PHP ortamı (Dockerfile ile birebir aynı eklentiler)
        working-directory: .
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends \
            git unzip libzip-dev libicu-dev libonig-dev default-mysql-client
          docker-php-ext-install -j"$(nproc)" pdo_mysql mbstring bcmath zip intl pcntl
          curl -sS https://getcomposer.org/installer -o /tmp/composer-setup.php
          php /tmp/composer-setup.php --install-dir=/usr/local/bin --filename=composer

      - name: Checkout
        uses: actions/checkout@v4

      - name: Ortam bilgisi
        run: |
          php -v
          composer -V

      - name: Copy .env
        run: cp .env.example .env

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Generate application key
        run: php artisan key:generate

      - name: Run test suite
        run: php artisan test

  mysql-tests:
    name: PHPUnit (MySQL 8)
    runs-on: ubuntu-latest
    container:
      image: php:8.4-cli
    defaults:
      run:
        working-directory: getiren

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: getiren_test
          MYSQL_USER: getiren
          MYSQL_PASSWORD: secret
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      # container job: servise adıyla erişilir, host port eşlemesi yok
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: getiren
      DB_PASSWORD: secret
      # DB_CONNECTION ve DB_DATABASE phpunit.mysql.xml'de force="true" ile sabitlenir:
      # test asla geliştirme şemasına yönelemez (RefreshDatabase tabloları düşürür).

    steps:
      - name: PHP ortamı (Dockerfile ile birebir aynı eklentiler)
        working-directory: .
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends \
            git unzip libzip-dev libicu-dev libonig-dev default-mysql-client
          docker-php-ext-install -j"$(nproc)" pdo_mysql mbstring bcmath zip intl pcntl
          curl -sS https://getcomposer.org/installer -o /tmp/composer-setup.php
          php /tmp/composer-setup.php --install-dir=/usr/local/bin --filename=composer

      - name: Checkout
        uses: actions/checkout@v4

      - name: Ortam bilgisi
        run: |
          php -v
          php -m | grep -i pdo_mysql

      - name: Copy .env
        run: cp .env.example .env

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Generate application key
        run: php artisan key:generate

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h mysql -ugetiren -psecret --silent; then exit 0; fi
            sleep 2
          done
          echo "MySQL 60 sn icinde hazir olmadi"
          exit 1

      - name: Run test suite (MySQL)
        run: php artisan test -c phpunit.mysql.xml

  quality:
    name: Kod stili & Composer denetimi
    runs-on: ubuntu-latest
    container:
      image: php:8.4-cli
    defaults:
      run:
        working-directory: getiren
    steps:
      - name: PHP ortamı (Dockerfile ile birebir aynı eklentiler)
        working-directory: .
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends \
            git unzip libzip-dev libicu-dev libonig-dev default-mysql-client
          docker-php-ext-install -j"$(nproc)" pdo_mysql mbstring bcmath zip intl pcntl
          curl -sS https://getcomposer.org/installer -o /tmp/composer-setup.php
          php /tmp/composer-setup.php --install-dir=/usr/local/bin --filename=composer

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Pint (kod stili)
        run: ./vendor/bin/pint --test

      # PHP bağımlılıkları az ve doğrudan bizim seçimimiz: açık varsa build kırılsın.
      - name: Composer güvenlik denetimi
        run: composer audit

  assets:
    name: Frontend build & npm denetimi
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: getiren
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: getiren/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      # npm ağacı derin; her transitive uyarıda kırmak akışı boğar.
      # Yüksek/kritik kırar, düşük seviye rapor olarak kalır.
      - name: npm güvenlik denetimi
        run: npm audit --audit-level=high
