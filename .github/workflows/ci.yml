name: CI

# Her push ve pull request'te çalışır.
# Not: Laravel uygulaması repo kökünde değil, `getiren/` alt klasöründe;
# bu yüzden adımlar working-directory: getiren ile koşar.
# Testler sqlite bellek-içi çalıştığı için (phpunit.xml) MySQL servisine gerek yok.

on:
  push:
  pull_request:

jobs:
  tests:
    name: PHPUnit (php artisan test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: getiren
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3, mbstring, bcmath, intl, zip, pcntl
          coverage: none

      - name: Copy .env
        run: cp .env.example .env

      - name: Install Composer dependencies
        uses: ramsey/composer-install@3
        with:
          working-directory: getiren

      - name: Generate application key
        run: php artisan key:generate

      - name: Run test suite
        run: php artisan test

  assets:
    name: Frontend build (vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: getiren
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: getiren/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets
        run: npm run build
