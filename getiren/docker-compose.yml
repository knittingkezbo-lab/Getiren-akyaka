services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: getiren-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - getiren

  web:
    image: nginx:alpine
    container_name: getiren-web
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - getiren

  db:
    image: mysql:8.0
    container_name: getiren-db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: getiren
      MYSQL_USER: getiren
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "33061:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - getiren

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: getiren-pma
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    ports:
      - "8081:80"
    depends_on:
      - db
    networks:
      - getiren

  # Vite dev sunucusu (frontend derleme + HMR) — yerelde node gerekmez
  # glibc tabanlı imaj: Vite 8'in native binary'leri (Rolldown/oxc) musl'da SIGBUS veriyor
  node:
    image: node:22-slim
    container_name: getiren-node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - getiren

  # E-posta yakalayıcı (dev) — gönderilen mailler http://localhost:8025'te görünür
  mailpit:
    image: axllent/mailpit:latest
    container_name: getiren-mailpit
    ports:
      - "8025:8025"   # web arayüzü
      - "1025:1025"   # SMTP
    networks:
      - getiren

volumes:
  dbdata:

networks:
  getiren:
    driver: bridge
